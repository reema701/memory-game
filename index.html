<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الذاكرة 🎉</title>
<style>
  :root{
    --bg-1:#FF6B9D;
    --bg-2:#7C3AED;
    --bg-3:#2DD4BF;
    --bg-4:#FFD23F;
    --card-back-1:#FF8C42;
    --card-back-2:#FF3CAC;
    --accent-yellow:#FFD23F;
    --accent-teal:#2DD4BF;
    --accent-pink:#FF6B9D;
    --accent-orange:#FF8C42;
    --accent-purple:#A855F7;
    --accent-blue:#38BDF8;
    --white:#FFFFFF;
    --ink:#3B0764;
    --panel:#ffffff22;
    --panel-solid:#5B2A86;
    --success:#34D399;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
    background-size:400% 400%;
    animation:gradientShift 18s ease infinite;
    font-family:'Tahoma','Segoe UI',sans-serif;
    color:var(--white);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 12px 60px;
    overflow-x:hidden;
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  @media (prefers-reduced-motion: reduce){
    body{animation:none;}
  }

  h1{
    font-size:clamp(28px,6vw,46px);
    margin:6px 0 2px;
    text-align:center;
    text-shadow:0 4px 0 rgba(0,0,0,.25);
    letter-spacing:1px;
    background:linear-gradient(90deg,var(--accent-yellow),var(--accent-pink),var(--accent-teal),var(--accent-yellow));
    background-size:300% auto;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:titleShine 6s linear infinite;
  }
  @keyframes titleShine{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
  }
  @media (prefers-reduced-motion: reduce){
    h1{animation:none;}
  }
  .subtitle{
    opacity:.85;
    font-size:clamp(14px,3vw,18px);
    margin-bottom:18px;
    text-align:center;
  }

  /* ---------- شاشات عامة ---------- */
  .screen{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .hidden{display:none !important;}

  .big-btn{
    background:linear-gradient(180deg,var(--accent-teal),#14B8A6);
    color:var(--ink);
    border:none;
    border-radius:18px;
    padding:16px 34px;
    font-size:clamp(18px,3.5vw,24px);
    font-weight:900;
    cursor:pointer;
    box-shadow:0 6px 0 #0F766E, 0 10px 18px rgba(0,0,0,.3);
    transition:transform .08s ease;
    font-family:inherit;
  }
  .big-btn:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 #0F766E, 0 4px 10px rgba(0,0,0,.3);
  }
  .big-btn.secondary{
    background:linear-gradient(180deg,var(--accent-yellow),#F5A623);
    box-shadow:0 6px 0 #B8780E, 0 10px 18px rgba(0,0,0,.3);
  }
  .big-btn.secondary:active{
    box-shadow:0 2px 0 #B8780E, 0 4px 10px rgba(0,0,0,.3);
  }
  .big-btn.pink{
    background:linear-gradient(180deg,var(--accent-pink),#E0457E);
    box-shadow:0 6px 0 #A82F5C, 0 10px 18px rgba(0,0,0,.3);
  }
  .big-btn.pink:active{
    box-shadow:0 2px 0 #A82F5C, 0 4px 10px rgba(0,0,0,.3);
  }
  .big-btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    box-shadow:none;
    transform:none;
  }

  /* ---------- شاشة رفع الصور ---------- */
  .title-field{
    width:100%;
    max-width:480px;
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .title-field label{
    font-size:15px;
    font-weight:700;
    opacity:.9;
  }
  .title-field input{
    font-family:inherit;
    font-size:18px;
    font-weight:700;
    color:var(--ink);
    background:var(--white);
    border:3px solid var(--accent-purple);
    border-radius:14px;
    padding:12px 16px;
    outline:none;
    text-align:center;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    transition:border-color .2s, transform .1s;
  }
  .title-field input:focus{
    border-color:var(--accent-pink);
    transform:scale(1.02);
  }
  .title-field input::placeholder{
    color:#9b8bb0;
    font-weight:500;
  }

  .pairs-field{
    width:100%;
    max-width:480px;
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
  }
  .pairs-field label{
    font-size:15px;
    font-weight:700;
    opacity:.9;
  }
  .pairs-options{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .pairs-btn{
    font-family:inherit;
    font-size:17px;
    font-weight:800;
    color:var(--white);
    background:rgba(255,255,255,.12);
    border:3px solid rgba(255,255,255,.3);
    border-radius:14px;
    padding:10px 18px;
    min-width:52px;
    cursor:pointer;
    transition:transform .1s, border-color .2s, background .2s;
  }
  .pairs-btn:hover{
    transform:scale(1.06);
    border-color:var(--accent-teal);
  }
  .pairs-btn.active{
    background:linear-gradient(180deg,var(--accent-pink),#E0457E);
    border-color:var(--white);
    box-shadow:0 4px 0 #A82F5C;
  }

  .upload-intro{
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:18px 22px;
    margin-bottom:22px;
    max-width:640px;
    text-align:center;
    font-size:clamp(15px,2.8vw,18px);
    line-height:1.7;
    box-shadow:0 8px 0 rgba(0,0,0,.2);
  }
  .upload-intro b{color:var(--accent-yellow);}

  .upload-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    width:100%;
    max-width:640px;
    margin-bottom:26px;
  }
  @media (max-width:540px){
    .upload-grid{grid-template-columns:repeat(3,1fr);}
  }

  .upload-slot{
    aspect-ratio:1/1;
    border-radius:16px;
    border:3px dashed rgba(255,255,255,.35);
    background:rgba(255,255,255,.06);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .12s ease, border-color .2s, box-shadow .2s;
    font-size:clamp(11px,2vw,13px);
    text-align:center;
    padding:4px;
  }
  .upload-slot:hover{
    transform:scale(1.04);
    border-color:var(--accent-teal);
  }
  .upload-slot.filled{
    border-style:solid;
    border-color:var(--success);
  }
  .upload-slot.filled.selected{
    border-color:var(--accent-yellow);
    box-shadow:0 0 0 4px rgba(255,210,63,.45);
    transform:scale(1.04);
  }
  .upload-slot.filled.paired{
    border-color:var(--pair-color);
    box-shadow:0 0 0 4px color-mix(in srgb, var(--pair-color) 45%, transparent);
  }
  .upload-slot-label{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .upload-slot img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    inset:0;
  }
  .upload-slot .plus{
    font-size:clamp(22px,5vw,30px);
    line-height:1;
    margin-bottom:4px;
  }
  .upload-slot .check{
    position:absolute;
    top:4px;
    left:4px;
    background:var(--success);
    color:var(--ink);
    border-radius:50%;
    width:24px;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:900;
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .upload-slot .pair-badge{
    position:absolute;
    bottom:4px;
    right:4px;
    background:var(--pair-color, var(--accent-purple));
    color:var(--ink);
    border-radius:8px;
    min-width:22px;
    height:22px;
    padding:0 5px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .upload-slot .change-photo-btn{
    position:absolute;
    top:4px;
    right:4px;
    background:rgba(0,0,0,.55);
    color:var(--white);
    border-radius:50%;
    width:24px;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    cursor:pointer;
    z-index:2;
  }
  .upload-slot input[type=file]{display:none;}

  .upload-actions{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .progress-note{
    margin-top:14px;
    font-size:15px;
    opacity:.85;
  }

  /* ---------- شاشة اللعب ---------- */
  .hud{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:18px;
  }
  .pill{
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:10px 20px;
    font-size:clamp(14px,2.6vw,17px);
    font-weight:700;
    box-shadow:0 4px 0 rgba(0,0,0,.2);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .pill .num{
    color:var(--accent-yellow);
    font-size:1.15em;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    width:100%;
    max-width:560px;
    margin-bottom:20px;
  }
  @media (max-width:480px){
    .board{grid-template-columns:repeat(4,1fr) !important; gap:8px;}
  }

  .card{
    aspect-ratio:1/1;
    position:relative;
    perspective:800px;
    cursor:pointer;
  }
  .card-inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .card.flipped .card-inner{
    transform:rotateY(180deg);
  }
  .card.matched .card-inner{
    transform:rotateY(180deg);
  }
  .card-face{
    position:absolute;
    inset:0;
    border-radius:14px;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .card-back{
    background:linear-gradient(160deg,var(--cb1,var(--card-back-1)),var(--cb2,var(--card-back-2)));
    box-shadow:0 5px 0 rgba(0,0,0,.25), inset 0 0 0 3px rgba(255,255,255,.18);
    transition:filter .15s ease;
  }
  .card:hover:not(.flipped):not(.matched) .card-back{
    filter:brightness(1.12);
  }
  .card-back::after{
    content:"★";
    font-size:clamp(20px,5vw,30px);
    color:rgba(255,255,255,.55);
  }
  .card-front{
    background:var(--white);
    transform:rotateY(180deg);
    box-shadow:0 5px 0 rgba(0,0,0,.25);
  }
  .card-front img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .card.matched .card-back{
    box-shadow:0 0 0 3px var(--success), 0 5px 0 rgba(0,0,0,.25);
  }
  .card.matched .card-inner{
    animation:pop .4s ease;
  }
  .card.shake .card-inner{
    animation:shake .4s ease;
  }
  @keyframes pop{
    0%{transform:rotateY(180deg) scale(1);}
    40%{transform:rotateY(180deg) scale(1.12);}
    100%{transform:rotateY(180deg) scale(1);}
  }
  @keyframes shake{
    0%,100%{transform:rotateY(180deg) translateX(0);}
    25%{transform:rotateY(180deg) translateX(-6px);}
    75%{transform:rotateY(180deg) translateX(6px);}
  }

  /* ---------- شاشة الفوز ---------- */
  .win-box{
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:36px 28px;
    text-align:center;
    max-width:480px;
    box-shadow:0 10px 0 rgba(0,0,0,.25);
  }
  .win-box .emoji{
    font-size:64px;
    display:block;
    margin-bottom:10px;
  }
  .win-stats{
    display:flex;
    justify-content:center;
    gap:24px;
    margin:18px 0 26px;
    flex-wrap:wrap;
  }
  .win-stats div{
    font-size:15px;
    opacity:.85;
  }
  .win-stats .val{
    display:block;
    font-size:30px;
    font-weight:900;
    color:var(--accent-yellow);
  }

  /* قصف الألوان عند الفوز */
  .confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:14px;
    border-radius:2px;
    z-index:50;
    pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(360deg); opacity:0.9;}
  }

  .top-bar{
    display:flex;
    gap:10px;
    margin-bottom:6px;
  }
  .icon-btn{
    background:rgba(255,255,255,.12);
    border:none;
    color:var(--white);
    border-radius:12px;
    padding:8px 14px;
    font-size:14px;
    cursor:pointer;
    font-weight:700;
    font-family:inherit;
  }
  .icon-btn:hover{background:rgba(255,255,255,.22);}

  footer-note{display:none;}
</style>
</head>
<body>
<br>
<br>
<br>
<h1 id="game-title">🎮 لعبة الذاكرة</h1>
<p class="subtitle"></p>

<!-- ===================== شاشة 1: رفع الصور ===================== -->
<div class="screen" id="screen-upload">
  <div class="title-field">
    <label for="title-input">📝 اسم اللعبة</label>
    <input type="text" id="title-input" maxlength="40" placeholder="">
  </div>
<br>
<br>
  <div class="pairs-field">
    <label>🔢 عدد الأزواج</label>
    <div class="pairs-options" id="pairs-options">
      <button type="button" class="pairs-btn" data-pairs="4">4</button>
      <button type="button" class="pairs-btn" data-pairs="6">6</button>
      <button type="button" class="pairs-btn active" data-pairs="8">8</button>
      <button type="button" class="pairs-btn" data-pairs="10">10</button>
      <button type="button" class="pairs-btn" data-pairs="12">12</button>
    </div>
  </div>
<br>
  <div class="upload-intro">
<b><span id="cards-count-label">16</span> صورة</b> اضف الصور وحدد الازواج.
    <br>
   
    <br>
   
  </div>

  <div class="upload-grid" id="upload-grid"></div>
<br>
  <div class="upload-actions">
    <button class="big-btn secondary" id="random-fill-btn">🎲 جرّب بصور جاهزة</button>
    <button class="big-btn" id="start-game-btn" disabled>🚀 ابدأ اللعب</button>
  </div>
  <div class="progress-note" id="progress-note">0 من 16 صور جاهزة</div>
  <div class="progress-note" id="pairing-note">0 من 8 أزواج محدّدة</div>
</div>

<!-- ===================== شاشة 2: اللعب ===================== -->
<br>
<div class="screen hidden" id="screen-game">
  <div class="top-bar">
    <button class="icon-btn" id="back-to-upload-btn">⬅️ تغيير الصور</button>
    <button class="icon-btn" id="restart-btn">🔄 لعبة جديدة</button>
  </div><br>
  <br>
  <div class="hud">
    <div class="pill">⭐ نقاط: <span class="num" id="score-val">0</span></div>
    <div class="pill">🔁 محاولات: <span class="num" id="moves-val">0</span></div>
    <div class="pill">⏱️ الوقت: <span class="num" id="time-val">00:00</span></div>
  </div>
  <div class="board" id="board"></div>
</div>
<br>

<!-- ===================== شاشة 3: الفوز ===================== -->
<div class="screen hidden" id="screen-win">
  <div class="win-box">
    <span class="emoji">🏆</span>
    <h2 id="win-subtitle" style="margin:0;font-size:26px;">فزت !</h2>
    <div class="win-stats">
      <div>المحاولات<span class="val" id="win-moves">0</span></div>
      <div>الوقت<span class="val" id="win-time">00:00</span></div>
    </div>
    <button class="big-btn pink" id="play-again-btn">🔄 العب مرة ثانية</button>
  </div>
</div>

<script>
(function(){
  let TOTAL_PAIRS = 8;
  let TOTAL_CARDS = TOTAL_PAIRS * 2;
  let uploadedImages = new Array(TOTAL_CARDS).fill(null); // dataURLs, واحدة لكل خانة/بطاقة
  let pairOf = new Array(TOTAL_CARDS).fill(null); // pairOf[index] = رقم الزوج أو null
  let pendingIndex = null; // أول صورة محددة في انتظار اختيار رفيقتها
  let nextPairNumber = 1; // أول رقم زوج فاضي

  // ---------- عناصر DOM ----------
  const uploadGrid = document.getElementById('upload-grid');
  const startBtn = document.getElementById('start-game-btn');
  const randomFillBtn = document.getElementById('random-fill-btn');
  const progressNote = document.getElementById('progress-note');
  const pairingNote = document.getElementById('pairing-note');
  const titleInput = document.getElementById('title-input');
  const gameTitle = document.getElementById('game-title');
  const DEFAULT_TITLE = '🎮 لعبة الذاكرة';
  const DEFAULT_WIN_MESSAGE = 'فزت !';
  const pairsOptions = document.getElementById('pairs-options');
  const cardsCountLabel = document.getElementById('cards-count-label');

  const screenUpload = document.getElementById('screen-upload');
  const screenGame = document.getElementById('screen-game');
  const screenWin = document.getElementById('screen-win');

  const board = document.getElementById('board');
  const scoreVal = document.getElementById('score-val');
  const movesVal = document.getElementById('moves-val');
  const timeVal = document.getElementById('time-val');

  const backToUploadBtn = document.getElementById('back-to-upload-btn');
  const restartBtn = document.getElementById('restart-btn');
  const playAgainBtn = document.getElementById('play-again-btn');

  const winMoves = document.getElementById('win-moves');
  const winTime = document.getElementById('win-time');
  const winSubtitle = document.getElementById('win-subtitle');

  // ---------- عنوان اللعبة ----------
  titleInput.addEventListener('input', ()=>{
    const val = titleInput.value.trim();
    gameTitle.textContent = val ? `🎮 ${val}` : DEFAULT_TITLE;
  });

  // ---------- عدد الأزواج ----------
  pairsOptions.addEventListener('click', (e)=>{
    const btn = e.target.closest('.pairs-btn');
    if(!btn) return;
    const newPairs = parseInt(btn.dataset.pairs);
    if(newPairs === TOTAL_PAIRS) return;

    // حافظ على الصور المرفوعة سابقًا بقدر المستطاع (الربط يُعاد من الصفر لأن الأزواج تغيّرت)
    const oldImages = uploadedImages;
    TOTAL_PAIRS = newPairs;
    TOTAL_CARDS = TOTAL_PAIRS * 2;
    uploadedImages = new Array(TOTAL_CARDS).fill(null);
    for(let i=0;i<Math.min(oldImages.length, TOTAL_CARDS);i++){
      uploadedImages[i] = oldImages[i];
    }
    pairOf = new Array(TOTAL_CARDS).fill(null);
    pendingIndex = null;
    nextPairNumber = 1;

    pairsOptions.querySelectorAll('.pairs-btn').forEach(b=> b.classList.remove('active'));
    btn.classList.add('active');
    cardsCountLabel.textContent = TOTAL_CARDS;

    buildUploadGrid();
    updateProgress();
  });

  // ---------- بناء خانات رفع الصور ----------
  function buildUploadGrid(){
    uploadGrid.innerHTML = '';
    for(let i=0;i<TOTAL_CARDS;i++){
      const slot = document.createElement('div');
      slot.className = 'upload-slot';
      slot.dataset.index = i;

      if(uploadedImages[i]){
        renderSlotImage(slot, uploadedImages[i], i);
      } else {
        renderSlotEmpty(slot, i);
      }

      uploadGrid.appendChild(slot);
    }
    refreshPairBadges();
  }

  function renderSlotEmpty(slot, index){
    slot.innerHTML = '';
    slot.classList.remove('filled','selected');
    slot.style.removeProperty('--pair-color');

    const label = document.createElement('label');
    label.className = 'upload-slot-label';
    label.innerHTML = `<div class="plus">📷</div><div>صورة ${index+1}</div>`;

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.addEventListener('change', (e)=> handleFileSelect(e, index, slot));

    label.appendChild(input);
    slot.appendChild(label);
  }

  function handleFileSelect(e, index, slot){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      uploadedImages[index] = ev.target.result;
      renderSlotImage(slot, ev.target.result, index);
      refreshPairBadges();
      updateProgress();
    };
    reader.readAsDataURL(file);
  }

  function renderSlotImage(slot, dataUrl, index){
    slot.classList.add('filled');
    slot.innerHTML = '';

    const img = document.createElement('img');
    img.src = dataUrl;
    slot.appendChild(img);

    const check = document.createElement('div');
    check.className = 'check';
    check.textContent = '✓';
    slot.appendChild(check);

    // زر صغير لتغيير الصورة لاحقًا
    const changeLabel = document.createElement('label');
    changeLabel.className = 'change-photo-btn';
    changeLabel.title = 'تغيير الصورة';
    changeLabel.textContent = '✏️';
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.addEventListener('change', (e)=>{
      e.stopPropagation();
      handleFileSelect(e, index, slot);
    });
    changeLabel.addEventListener('click', (e)=> e.stopPropagation());
    changeLabel.appendChild(input);
    slot.appendChild(changeLabel);

    // الضغط على الصورة نفسها = اختيارها لتحديد الزوج
    slot.addEventListener('click', (e)=>{
      if(e.target.closest('.change-photo-btn')) return;
      onSlotClickForPairing(index);
    });
  }

  // ---------- تحديد الأزواج يدويًا ----------
  function onSlotClickForPairing(index){
    if(!uploadedImages[index]) return; // لازم تكون فيها صورة

    // لو الزوج مكوّن بالفعل: اضغط على أي طرف منه لفكّه
    if(pairOf[index] !== null){
      const num = pairOf[index];
      for(let i=0;i<TOTAL_CARDS;i++){
        if(pairOf[i] === num) pairOf[i] = null;
      }
      refreshPairBadges();
      updateProgress();
      return;
    }

    if(pendingIndex === null){
      // أول صورة في الزوج الجديد
      pendingIndex = index;
      refreshPairBadges();
      return;
    }

    if(pendingIndex === index){
      // ضغط على نفس الصورة مرتين: يلغي التحديد
      pendingIndex = null;
      refreshPairBadges();
      return;
    }

    if(pairOf[pendingIndex] !== null){
      // احتياط: الصورة المعلّقة صارت مربوطة من مكان آخر
      pendingIndex = null;
    }

    // كوّن الزوج بين الصورة المعلّقة وهذه الصورة
    const num = nextPairNumber;
    pairOf[pendingIndex] = num;
    pairOf[index] = num;
    nextPairNumber = computeNextPairNumber();
    pendingIndex = null;

    refreshPairBadges();
    updateProgress();
  }

  function computeNextPairNumber(){
    const used = new Set(pairOf.filter(v=> v !== null));
    let n = 1;
    while(used.has(n)) n++;
    return n;
  }

  const PAIR_COLORS = ['#FF6B9D','#2DD4BF','#FFD23F','#A855F7','#FF8C42','#34D399','#60A5FA','#F472B6','#FDBA74','#C4B5FD','#5EEAD4','#FCA5A5'];

  function refreshPairBadges(){
    const slots = uploadGrid.querySelectorAll('.upload-slot');
    slots.forEach((slot, i)=>{
      slot.classList.remove('selected','paired');
      let badge = slot.querySelector('.pair-badge');
      if(badge) badge.remove();
      slot.style.removeProperty('--pair-color');

      if(!uploadedImages[i]) return;

      if(i === pendingIndex){
        slot.classList.add('selected');
        return;
      }

      const num = pairOf[i];
      if(num !== null){
        const color = PAIR_COLORS[(num-1) % PAIR_COLORS.length];
        slot.style.setProperty('--pair-color', color);
        slot.classList.add('paired');
        const b = document.createElement('div');
        b.className = 'pair-badge';
        b.textContent = num;
        slot.appendChild(b);
      }
    });
  }

  function updateProgress(){
    const uploadedCount = uploadedImages.filter(Boolean).length;
    const pairedCount = new Set(pairOf.filter(v=> v !== null)).size;

    progressNote.textContent = `${uploadedCount} من ${TOTAL_CARDS} صور جاهزة`;
    pairingNote.textContent = `${pairedCount} من ${TOTAL_PAIRS} أزواج محدّدة`;

    startBtn.disabled = uploadedCount < TOTAL_CARDS || pairedCount < TOTAL_PAIRS;
  }

  // صور جاهزة (إيموجي كبير على خلفية ملونة) لو الطفل يبغى يجرب بسرعة
  const EMOJI_SET = ['🦁','🐸','🦋','🐳','🐢','🦊','🐼','🦄','🐝','🐙','🦓','🐨'];
  const EMOJI_COLORS = ['#FF6B9D','#2DD4BF','#FFD23F','#A855F7','#FF8C42','#34D399','#60A5FA','#F472B6'];

  function makeEmojiDataUrl(emoji, color){
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
        <rect width="200" height="200" rx="20" fill="${color}"/>
        <text x="50%" y="55%" font-size="100" text-anchor="middle" dominant-baseline="middle">${emoji}</text>
      </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  }

  randomFillBtn.addEventListener('click', ()=>{
    // يعبّي كل خانة بصورة (إيموجي) ويربط الأزواج تلقائيًا (1+2, 3+4...) كبداية سريعة
    pairOf = new Array(TOTAL_CARDS).fill(null);
    pendingIndex = null;
    nextPairNumber = 1;
    for(let i=0;i<TOTAL_PAIRS;i++){
      const emoji = EMOJI_SET[i % EMOJI_SET.length];
      const color = EMOJI_COLORS[i % EMOJI_COLORS.length];
      const url = makeEmojiDataUrl(emoji, color);
      uploadedImages[i*2] = url;
      uploadedImages[i*2+1] = url;
      pairOf[i*2] = i+1;
      pairOf[i*2+1] = i+1;
    }
    nextPairNumber = computeNextPairNumber();
    buildUploadGrid();
    updateProgress();
  });

  // ---------- حالة اللعبة ----------
  let cardsData = [];
  let flippedCards = [];
  let matchedCount = 0;
  let moves = 0;
  let score = 0;
  let timerInterval = null;
  let secondsElapsed = 0;
  let lockBoard = false;

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function buildBoard(){
    let pairItems = [];
    uploadedImages.forEach((url, idx)=>{
      pairItems.push({pairId: pairOf[idx], url});
    });
    pairItems = shuffle(pairItems);

    const totalCards = pairItems.length;
    const cols = totalCards <= 8 ? 4 : (totalCards <= 16 ? 4 : (totalCards <= 20 ? 5 : 6));
    board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    const backPalette = [
      ['#FF8C42','#FF3CAC'], ['#7C3AED','#38BDF8'], ['#34D399','#2DD4BF'],
      ['#FFD23F','#FF8C42'], ['#A855F7','#FF6B9D'], ['#38BDF8','#34D399'],
      ['#FF6B9D','#FFD23F'], ['#2DD4BF','#7C3AED']
    ];

    board.innerHTML = '';
    cardsData = [];

    pairItems.forEach((item, i)=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.pairId = item.pairId;
      card.dataset.cardIndex = i;
      const colors = backPalette[Math.floor(Math.random()*backPalette.length)];
      card.style.setProperty('--cb1', colors[0]);
      card.style.setProperty('--cb2', colors[1]);

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      const back = document.createElement('div');
      back.className = 'card-face card-back';

      const front = document.createElement('div');
      front.className = 'card-face card-front';
      const img = document.createElement('img');
      img.src = item.url;
      front.appendChild(img);

      inner.appendChild(back);
      inner.appendChild(front);
      card.appendChild(inner);

      card.addEventListener('click', ()=> onCardClick(card));
      board.appendChild(card);
      cardsData.push(card);
    });
  }

  function onCardClick(card){
    if(lockBoard) return;
    if(card.classList.contains('flipped') || card.classList.contains('matched')) return;
    if(flippedCards.length === 2) return;

    card.classList.add('flipped');
    flippedCards.push(card);

    if(flippedCards.length === 2){
      moves++;
      movesVal.textContent = moves;
      checkMatch();
    }
  }

  function checkMatch(){
    const [c1, c2] = flippedCards;
    const isMatch = c1.dataset.pairId === c2.dataset.pairId;

    if(isMatch){
      lockBoard = true;
      setTimeout(()=>{
        c1.classList.add('matched');
        c2.classList.add('matched');
        matchedCount++;
        score += 10;
        scoreVal.textContent = score;
        flippedCards = [];
        lockBoard = false;
        if(matchedCount === TOTAL_PAIRS){
          endGame();
        }
      }, 350);
    } else {
      lockBoard = true;
      c1.classList.add('shake');
      c2.classList.add('shake');
      setTimeout(()=>{
        c1.classList.remove('flipped','shake');
        c2.classList.remove('flipped','shake');
        flippedCards = [];
        lockBoard = false;
      }, 800);
    }
  }

  function startTimer(){
    secondsElapsed = 0;
    timeVal.textContent = '00:00';
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
      secondsElapsed++;
      const m = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
      const s = String(secondsElapsed%60).padStart(2,'0');
      timeVal.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer(){
    clearInterval(timerInterval);
  }

  function resetGameState(){
    flippedCards = [];
    matchedCount = 0;
    moves = 0;
    score = 0;
    lockBoard = false;
    scoreVal.textContent = '0';
    movesVal.textContent = '0';
  }

  function startGame(){
    resetGameState();
    buildBoard();
    showScreen(screenGame);
    startTimer();
  }

  function endGame(){
    stopTimer();
    const m = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
    const s = String(secondsElapsed%60).padStart(2,'0');
    winMoves.textContent = moves;
    winTime.textContent = `${m}:${s}`;
    winSubtitle.textContent = DEFAULT_WIN_MESSAGE;
    showScreen(screenWin);
    launchConfetti();
  }

  function showScreen(target){
    [screenUpload, screenGame, screenWin].forEach(s=> s.classList.add('hidden'));
    target.classList.remove('hidden');
  }

  function launchConfetti(){
    const colors = ['#FF6B9D','#2DD4BF','#FFD23F','#A855F7','#FF8C42','#34D399'];
    for(let i=0;i<60;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random()*100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDuration = (2 + Math.random()*1.5) + 's';
      piece.style.animationDelay = (Math.random()*0.5) + 's';
      document.body.appendChild(piece);
      setTimeout(()=> piece.remove(), 4000);
    }
  }

  // ---------- أحداث الأزرار ----------
  startBtn.addEventListener('click', startGame);

  backToUploadBtn.addEventListener('click', ()=>{
    stopTimer();
    showScreen(screenUpload);
  });

  restartBtn.addEventListener('click', startGame);
  playAgainBtn.addEventListener('click', startGame);

  // ---------- تهيئة ----------
  cardsCountLabel.textContent = TOTAL_CARDS;
  buildUploadGrid();
  updateProgress();
})();
</script>
</body>
</html>
